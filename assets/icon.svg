<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c1810"/>
      <stop offset="100%" stop-color="#1a0f0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#daa520"/>
      <stop offset="50%" stop-color="#c9a64e"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- 高音谱号 -->
  <g transform="translate(512,512) scale(1.1)">
    <path d="
      M -10 340
      C -10 380, 40 400, 40 360
      C 40 300, -30 240, -30 160
      C -30 80, 20 -20, 30 -100
      C 40 -180, 10 -260, -10 -300
      C -5 -300, 5 -290, 5 -260
      C 5 -200, -40 -140, -40 -80
      C -40 -20, 10 20, 10 80
      C 10 140, -20 200, -20 260
      C -20 300, 10 320, 10 340
      C 10 350, 0 355, -10 340
      Z
    " fill="none" stroke="url(#gold)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 谱号圆点 -->
    <circle cx="-10" cy="340" r="16" fill="url(#gold)"/>
  </g>

  <!-- 底部音符装饰 -->
  <g transform="translate(350, 780)">
    <circle cx="40" cy="0" r="24" fill="url(#gold)"/>
    <line x1="64" y1="0" x2="64" y2="-120" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>
    <!-- 符尾 -->
    <path d="M 64 -120 Q 120 -100, 100 -60" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g transform="translate(530, 740)">
    <circle cx="40" cy="0" r="20" fill="url(#gold)" opacity="0.6"/>
    <line x1="60" y1="0" x2="60" y2="-90" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
